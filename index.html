<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Click Fruit Game</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%8D%8E%3C/text%3E%3C/svg%3E">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2922018866511094"
     crossorigin="anonymous"></script>
</head>
<body>
    <div class="game-container">
        <h1>Fruit Clicker</h1>
        <div class="stat-box">
            Clicks: <span id="counter">0</span> | <span id="multiplier">x1.0</span>
        </div>

        <!-- Contenedor para los textos flotantes de puntos -->
        <div id="effect-container"></div>

        <!-- Botón principal de la fruta -->
        <button id="click-btn" class="fruit-btn">🍎</button>
        <!-- Mensaje de estado -->
        <div id="message">Keep gathering!</div>
        <button id="share-btn" class="basket-btn">📤 Share</button>
<div class="fixed-actions">
    <button id="donate-btn" class="donate-btn">🎁</button>
    <button id="basket-btn" class="basket-btn">🧺</button>
</div>
    </div>

    <!-- MODAL DE LA CANASTA (COLECCIÓN) -->
    <div id="collection-panel" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Your Basket</h2>
                <button id="close-basket" class="close-btn">&times;</button>
            </div>

            <!-- Contenedor de pestañas -->
            <div class="tabs-container">
                <button id="tab-normal" class="tab-btn active">Normal</button>
                <button id="tab-gold" class="tab-btn">Gold</button>
                <button id="tab-gem" class="tab-btn">Gem</button>
                <button id="tab-galaxy" class="tab-btn">Galaxy</button>
                <button id="tab-rainbow" class="tab-btn">Rainbow</button>
            </div>

            <!-- Rejilla de frutas -->
            <div class="grid-container">
                <div id="fruit-grid" class="fruit-grid"></div>
            </div>
        </div>
    </div>
<audio id="click-sound" src="pop.mp3"></audio>
<audio id="special-sound" src="shiny.mp3"></audio>
<button id="reset-btn" class="donate-btn" style="display:none; margin-top:10px;">🔄 Reset Progress</button>
    <script src="script.js"></script>
</body>
</html>
